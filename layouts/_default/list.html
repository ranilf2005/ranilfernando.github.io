{{ define "main" }}
<section class="content-page">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  <div class="post-list">
    {{ range .Pages }}
      <article class="post-preview">
        <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        <p class="date">{{ .Date.Format "2 Jan 2006" }}</p>
        <p>{{ .Summary }}</p>
      </article>
    {{ end }}
  </div>
</section>
{{ end }}
