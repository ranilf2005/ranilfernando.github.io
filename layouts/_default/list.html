{{ define "main" }}
<h1>{{ .Title }}</h1>
<div class="post-list">
  {{ range .Pages }}
  <article class="list-item">
    <p class="date">{{ .Date.Format "02 Jan 2006" }}</p>
    <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
    <p>{{ .Summary }}</p>
  </article>
  {{ end }}
</div>
{{ end }}
