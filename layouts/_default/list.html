{{ define "main" }}
<section class="page-hero reveal">
  <p class="eyebrow">Blog</p>
  <h1>{{ .Title }}</h1>
  <p>Technical notes, architecture thinking, labs, and practical lessons from the field.</p>
</section>

<section class="section reveal">
  <div class="post-list">
    {{ range .Pages }}
      <article class="post-row">
        <div>
          <p class="post-date">{{ .Date.Format "02 Jan 2006" }}</p>
          <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
          <p>{{ .Summary | plainify | truncate 180 }}</p>
        </div>
        <a class="read-more" href="{{ .RelPermalink }}">Read →</a>
      </article>
    {{ end }}
  </div>
</section>
{{ end }}
