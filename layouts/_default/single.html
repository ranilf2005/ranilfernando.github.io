{{ define "main" }}
<article class="article">
  <p class="date">{{ .Date.Format "02 Jan 2006" }}</p>
  <h1>{{ .Title }}</h1>
  {{ if .Params.tags }}
  <div class="tags">
    {{ range .Params.tags }}<span>{{ . }}</span>{{ end }}
  </div>
  {{ end }}
  <div class="content">
    {{ .Content }}
  </div>
</article>
{{ end }}
