{{ define "main" }}
<article class="article reveal">
  <header class="article-header">
    <p class="eyebrow">{{ .Date.Format "02 Jan 2006" }}</p>
    <h1>{{ .Title }}</h1>
    {{ with .Params.description }}<p>{{ . }}</p>{{ end }}
  </header>

  <div class="article-body">
    {{ .Content }}
  </div>
</article>
{{ end }}
