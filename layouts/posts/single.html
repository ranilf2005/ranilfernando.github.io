{{ define "main" }}
<article class="article">
  <header class="article-header">
    <p class="eyebrow">Blog post • {{ .Date.Format "02 Jan 2006" }}</p>
    <h1>{{ .Title }}</h1>
    {{ with .Params.description }}
      <p>{{ . }}</p>
    {{ end }}
  </header>

  <div class="article-body force-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
